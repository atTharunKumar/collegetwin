services:
  - type: web
    name: collegetwin-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: MONGODB_URI
        scope: build
        value: ${MONGODB_URI}
      - key: CORS_ORIGIN
        scope: build
        value: ${CORS_ORIGIN}
      - key: NODE_ENV
        value: production
